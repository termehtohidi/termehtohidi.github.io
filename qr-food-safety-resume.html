<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Termeh Tohidi | Food Safety Resume QR</title>
    <meta name="description" content="Full-screen QR code for Termeh Tohidi's food safety resume.">
    <style>
      :root { color-scheme: light; --ink: #0f443a; --muted: #52615c; --soft: #f4f7f4; }
      * { box-sizing: border-box; }
      html, body { width: 100%; min-height: 100%; margin: 0; }
      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: clamp(12px, 3vw, 32px);
        color: var(--ink);
        background: var(--soft);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      img {
        display: block;
        width: auto;
        height: min(88vh, 96vw);
        max-width: 96vw;
        object-fit: contain;
      }
      a {
        position: fixed;
        right: 18px;
        bottom: 16px;
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 700;
        text-decoration: none;
      }
      a:hover { color: var(--ink); }
    </style>
  </head>
  <body>
    <main aria-label="Full-screen food safety resume QR code">
      <img src="assets/termeh-food-safety-resume-qr.svg" alt="QR code for Termeh Tohidi's food safety resume">
    </main>
    <a href="assets/termeh-tohidi-resume-lab-quality-safety.pdf">Open resume</a>
  </body>
</html>
